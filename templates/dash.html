<h1>Producción</h1>

<form method="POST" action="/add">
    Código: <input type="text" name="codigo">
    <button type="submit">Agregar</button>
</form>

<hr>

{% for item in data %}
<div style="border:1px solid black; padding:10px; margin:10px;">
    <b>{{item.codigo}}</b><br>
    Estado: {{item.estado}}<br>

    <a href="/next/{{loop.index0}}">➡️ Siguiente proceso</a>

    <h4>Historial:</h4>
    <ul>
    {% for h in item.historial %}
        <li>{{h}}</li>
    {% endfor %}
    </ul>
</div>
{% endfor %}
