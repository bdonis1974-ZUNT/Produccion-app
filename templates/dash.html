<!DOCTYPE html>
<html>
<head>
    <title>Producción</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .form-box {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .CORTE { color: red; }
        .COSTURA { color: orange; }
        .INSPECCION { color: purple; }
        .EMPAQUE { color: blue; }
        .COMPLETO { color: green; }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 6px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>📦 Producción</h1>

<div class="form-box">
    <form method="post" action="/add">
        Código: <input type="text" name="codigo">
        <button type="submit">Agregar</button>
    </form>
</div>

<hr>

{% for item in data %}
<div class="card">

    <h3>{{item.codigo}}</h3>

    <div class="{{item.estado}}">
        {{item.estado}}
    </div>

    <a href="/next/{{loop.index0}}">
        ➡️ Siguiente proceso
    </a>

    <h4>Historial:</h4>
    <ul>
        {% for h in item.historial %}
        <li>{{h}}</li>
        {% endfor %}
    </ul>

</div>
{% endfor %}

</body>
</html>
